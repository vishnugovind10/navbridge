name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          navbridge --help
          navbridge monitor --help
          navbridge validate-admin-file --config examples/mmf_scenario/config.json --admin-file examples/mmf_scenario/administrator_nav.csv --start 2026-01-01 --end 2026-01-31
          navbridge monitor --config examples/mmf_scenario/config.json --policy-pack policies/tokenized_mmf_v1.json --oracle simulated --drift-model BUIDL_STYLE --admin-file examples/mmf_scenario/administrator_nav.csv --start 2026-01-01 --end 2026-01-31 --output-json reports/ci_mmf.json --output-md reports/ci_mmf.md --audit-manifest reports/ci_mmf.audit.json --advise-policy
          navbridge batch --file examples/batch_portfolio.json --summary-json reports/ci_batch_summary.json
          python examples/mmf_scenario/run.py
